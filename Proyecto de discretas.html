<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE ALARMA INTELIGENTE</title>
    <style>
        :root {
            /* Colores de día */
            --day-bg: linear-gradient(180deg, #d9fa8d 0%, #68d4da 100%);
            /* Colores de noche */
            --night-bg: linear-gradient(180deg, #090909 0%, #2c3e50 100%);
            /* Colores de alerta */
            --alarm-bg: #600000;
            
            --card-bg: rgba(21, 27, 35, 0.9);
            --text-color: #ffffff;
            --accent-blue: #58a6ff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.8s ease;
            background: var(--day-bg);
            overflow: hidden;
        }

        /* Clase para el estado nocturno */
        body.is-night {
            background: var(--night-bg);
        }

        /* Clase para el estado de alarma */
        body.alarm-active {
            background: var(--alarm-bg);
            animation: pulse-red 1s infinite;
        }

        @keyframes pulse-red {
            0% { background-color: #600000; }
            50% { background-color: #b00000; }
            100% { background-color: #600000; }
        }

        .app-container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 380px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-size: 1.4rem; margin-bottom: 1.5rem; letter-spacing: 2px; color: var(--accent-blue); }

        .switch-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        input[type="checkbox"] {
            transform: scale(1.5);
            cursor: pointer;
        }

        .status-display {
            margin-top: 2rem;
            padding: 20px;
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
        }

        .indicator-light {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 15px;
            background: #444;
            transition: all 0.3s;
        }

        /* Colores de la luz indicadora */
        .light-safe { background: #3fb950; box-shadow: 0 0 20px #3fb950; }
        .light-warn { background: #d29922; box-shadow: 0 0 20px #d29922; }
        .light-danger { background: #f85149; box-shadow: 0 0 30px #f85149; }

        .label-text { font-weight: bold; font-size: 1.1rem; }
        .formula { font-family: monospace; color: #8b949e; margin-top: 8px; display: block; }
    </style>
</head>
<body id="mainBody">

<div class="app-container">
    <h1>ALARMA INTELIGENTE</h1>
    
    <div class="switch-box">
        <span>🌙 ¿Es de noche? (p)</span>
        <input type="checkbox" id="p" onchange="runLogic()">
    </div>
    
    <div class="switch-box">
        <span>🚶 ¿Movimiento? (q)</span>
        <input type="checkbox" id="q" onchange="runLogic()">
    </div>

    <div class="status-display">
        <div id="led" class="indicator-light"></div>
        <div id="statusLabel" class="label-text">DÍA - SISTEMA OFF</div>
        <span class="formula" id="math">r = p ∧ q</span>
    </div>
</div>

<script>
    function runLogic() {
        const p = document.getElementById('p').checked;
        const q = document.getElementById('q').checked;
        const r = p && q; // Nuestra conjunción lógica

        const body = document.getElementById('mainBody');
        const led = document.getElementById('led');
        const label = document.getElementById('statusLabel');
        const math = document.getElementById('math');

        // 1. Manejo del fondo según la variable 'p' (Noche)
        if (p) {
            body.classList.add('is-night');
        } else {
            body.classList.remove('is-night');
        }

        // 2. Manejo de la alarma según el resultado 'r'
        if (r) {
            body.classList.add('alarm-active');
            led.className = "indicator-light light-danger";
            label.innerText = "¡ALERTA DE INTRUSO!";
            label.style.color = "#ff7b72";
        } else {
            body.classList.remove('alarm-active');
            label.style.color = "#ffffff";
            
            if (p) {
                led.className = "indicator-light light-warn";
                label.innerText = "NOCHE - VIGILANDO";
            } else {
                led.className = "indicator-light light-safe";
                label.innerText = "DÍA - SISTEMA EN ESPERA";
            }
        }

        // 3. Actualizar fórmula
        math.innerText = `r = ${p?1:0} ∧ ${q?1:0} → ${r?1:0}`;
    }

    // Ejecutar al cargar
    runLogic();
</script>

</body>
</html>
